<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laura Vidal Zapico — Portfolio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js" defer></script>

<style>
body {margin:0;font-family:Arial;background:#0a0a0a;color:#fff}
section{padding:60px 20px;max-width:1200px;margin:auto}

.project-card{position:relative;overflow:hidden;margin-bottom:20px}
.project-img{width:100%;height:350px;object-fit:cover}

.project-overlay{
position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.8),transparent);
display:flex;flex-direction:column;justify-content:end;padding:20px
}

.project-link{color:#E6007E;text-decoration:none;font-weight:bold}
.project-link:hover{text-decoration:underline}

.filter-btn{margin:5px;padding:8px 12px;background:none;border:1px solid #555;color:#fff;cursor:pointer}
.filter-btn.active{background:#E6007E}

.hidden{display:none}
</style>
</head>

<body>

<section id="portfolio">
<h2>Portfolio</h2>

<div>
<button class="filter-btn active" data-filter="all">Todos</button>
<button class="filter-btn" data-filter="reel">Reels</button>
<button class="filter-btn" data-filter="campaña">Campañas</button>
</div>

<div id="projectsGrid">

<!-- REEL 1 -->
<article class="project-card" data-category="reel">
<video class="project-img" autoplay muted loop playsinline>
<source src="reel1.mp4" type="video/mp4">
</video>
<div class="project-overlay">
<span>Reel Instagram</span>
<h3>ARAKA Reel 1</h3>
<a href="#" class="project-link">Ver proyecto</a>
</div>
</article>

<!-- REEL 2 -->
<article class="project-card" data-category="reel">
<video class="project-img" autoplay muted loop playsinline>
<source src="reel2.mp4" type="video/mp4">
</video>
<div class="project-overlay">
<span>Reel Instagram</span>
<h3>ARAKA Reel 2</h3>
<a href="#" class="project-link">Ver proyecto</a>
</div>
</article>

<!-- CAMPAÑA 1 -->
<article class="project-card" data-category="campaña">
<video class="project-img" controls>
<source src="assests/reel1.mp4" type="video/mp4">
</video>
<div class="project-overlay">
<span>Campaña Paid</span>
<h3>ARAKA Campaña 1</h3>
<a href="#" class="project-link">Ver proyecto</a>
</div>
</article>

<!-- CAMPAÑA 2 -->
<article class="project-card" data-category="campaña">
<video class="project-img" controls>
<source src="campaña2.mp4" type="video/mp4">
</video>
<div class="project-overlay">
<span>Campaña Paid</span>
<h3>ARAKA Campaña 2</h3>
<a href="#" class="project-link">Ver proyecto</a>
</div>
</article>

</div>
</section>

<script>
window.addEventListener('load', () => {

if (typeof gsap !== 'undefined') {
gsap.registerPlugin(ScrollTrigger);
}

/* ✅ FIX CLICK LINKS */
document.querySelectorAll('.project-link').forEach(link => {
link.addEventListener('click', e => e.preventDefault());
});

/* ✅ FILTRO */
const btns = document.querySelectorAll('.filter-btn');
const cards = document.querySelectorAll('.project-card');

btns.forEach(btn => {
btn.addEventListener('click', () => {

btns.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

const filter = btn.dataset.filter;

cards.forEach(card => {
if(filter === 'all' || card.dataset.category === filter){
card.classList.remove('hidden');
}else{
card.classList.add('hidden');
}
});

});
});

});
</script>

</body>
</html>
